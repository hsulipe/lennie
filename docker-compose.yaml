services:
  login:
    build: ./login
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - GO_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=login_db
      # OIDC / OAuth settings — client credentials match dex/config.yaml staticClients
      - OIDC_ISSUER=http://localhost:8081/dex
      - OIDC_PROVIDER_URL=http://dex:5556/dex
      - OIDC_CLIENT_ID=login-app
      - OIDC_CLIENT_SECRET=login-app-secret
      - OIDC_REDIRECT_URL=http://localhost:8080/auth/callback
    # Allows the container to reach localhost:8081 (Dex) via the host machine.
    # Required because the OIDC issuer URL uses localhost, not the Docker service name.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      dex:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: login_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d login_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  migration:
    image: flyway/flyway:latest
    command: migrate
    volumes:
      - ./login/sql:/flyway/sql
    environment:
      - FLYWAY_URL=jdbc:postgresql://db:5432/login_db
      - FLYWAY_USER=user
      - FLYWAY_PASSWORD=password
    depends_on:
      db:
        condition: service_healthy

  dex:
    image: dexidp/dex:latest
    command: dex serve /etc/dex/config.yaml
    ports:
      - "8081:5556"
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped