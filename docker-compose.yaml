services:
  login:
    build: ./login
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - GO_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=login_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: login_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d login_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  migration:
    image: flyway/flyway:latest
    command: migrate
    volumes:
      - ./login/sql:/flyway/sql
    environment:
      - FLYWAY_URL=jdbc:postgresql://db:5432/login_db
      - FLYWAY_USER=user
      - FLYWAY_PASSWORD=password
    depends_on:
      db:
        condition: service_healthy